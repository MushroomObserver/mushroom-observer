# SENSITIVE INFORMATION: This file should not be checked into subversion

# MySQL (default setup).  Versions 4.1 and 5.0 are recommended.
#
# Get the fast C bindings:
#   gem install trilogy
#   (on OS X: gem install mysql -- --include=/usr/local/lib)
# And be sure to use new-style password hashing:
#   http://dev.mysql.com/doc/refman/5.0/en/old-client.html

shared:
  adapter: trilogy
  # Default (works for MacOS X)
  # socket: /tmp/mysql.sock
  # For Ubuntu/Debian
  socket: /var/run/mysqld/mysqld.sock
  # For Fedora
  # socket: /var/lib/mysql/mysql.sock
  # Connect on a TCP socket.  If omitted, the adapter will connect on the
  # domain socket given by socket instead.
  #host: localhost
  #port: 3306
  # For mysql >= 5.7.5
  # Do not require SELECT list to include ORDER BY columns in DISTINCT queries,
  # And do not not require ORDER BY to include the DISTINCT column.
  variables:
    sql_mode: TRADITIONAL

development:
  primary:
    database: mo_development
    username: mo
    password: mo
  cache:
    database: cache_development
    username: mo
    password: mo
    host: localhost
    migrations_paths: "db/cache/migrate"

# Warning: The database defined as 'test' will be erased and
# re-generated from your development database when you run 'rake'.
# Do not set this db to the same as development or production.
#
# Parallel testing: TEST_ENV_NUMBER selects mo_test-0, mo_test-1, etc.
# MO_TEST_DATABASE can override for manual testing.
#
# Multi-db (primary/cache) like development/production, not a flat db:,
# so Solid Cache (#4807's I18n backend) has a real solid_cache_entries
# table in test instead of raising when it's actually touched -- see
# config/environments/test.rb's solid_cache.connects_to.
<%
  worker_suffix = ENV["TEST_ENV_NUMBER"].to_s.empty? ? "" : "-#{ENV["TEST_ENV_NUMBER"]}"
  test_db = ENV["MO_TEST_DATABASE"] || "mo_test#{worker_suffix}"
  # "cache_<env>", matching cache_development/cache_production -- not
  # <primary>_cache. MO_TEST_DATABASE is a full manual override with no
  # tied cache-naming convention, so just suffix it in that one case.
  cache_test_db = ENV["MO_TEST_DATABASE"] ? "#{test_db}_cache" :
                  "cache_test#{worker_suffix}"
%>
test:
  primary:
    database: "<%= test_db %>"
    username: mo
    password: mo
    # Must exceed Solid Queue's own estimated thread need -- see
    # test/jobs/queue_config_test.rb and the comment on the equivalent
    # setting in config/database.yml (not checked in; this file is what CI
    # copies to config/database.yml for test runs).
    pool: 10
  cache:
    database: "<%= cache_test_db %>"
    username: mo
    password: mo
    migrations_paths: "db/cache/migrate"

production:
  database: mo_development
  username: mo
  password: mo
