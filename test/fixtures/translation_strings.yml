# #4807: real production translation content, generated from en.txt so it's
# always in sync (no separate hand-maintenance burden, no risk of drifting
# from the real value the way the old hand-typed unknown_locations_string
# fixture did -- see Location.names_for_unknown/official_unknown, which
# broke against a stale hand-typed copy missing "Worldwide"). Needed
# because I18n::Backend::DbFallback resolves "mo:" tags directly against
# this table now -- unlike the old file-based backend, which loaded the
# full config/locales/en.yml regardless of what was in this fixture file.
#
# English only: DbFallback's official-locale fallback means other
# locales' lookups already resolve through English's row when they lack
# their own override (see Language#localization_strings), so generating
# every other locale here too would be redundant.
#
# Excludes tags already hand-fixtured above for English -- en.txt
# genuinely reuses "one" and "all" as real production tags (see
# english_one/english_waiting_for_update), and several tests mutate
# those rows' text (e.g. LanguageTest#test_update_localization). A
# second auto-generated row for the same (language, tag) would leave a
# stale, never-updated duplicate that some readers (find_each,
# find_by) could return instead of the row the test just changed.
<%
  hand_fixtured_english_tags = %w[one two TWO twos TWOS three four all]
  en_txt_path = Rails.root.join("config/locales/en.txt")
  YAML.safe_load(File.read(en_txt_path), permitted_classes: [Symbol]).
    each do |tag, text|
    next unless text.is_a?(String)
    next if hand_fixtured_english_tags.include?(tag.to_s)
%>
<%= { "imported_#{tag}" => {
      "version" => 1,
      "language" => "english",
      "tag" => tag.to_s,
      "text" => text,
      "updated_at" => "2012-05-30",
      "user_id" => 0
    } }.to_yaml.sub(/\A---\n/, "") %>
<% end %>
