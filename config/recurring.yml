# Solid Queue supports defining recurring tasks that run at specific times in
# the future, on a regular basis like cron jobs. These are managed by the
# scheduler process and are defined in their own configuration file.
# https://github.com/rails/solid_queue/tree/main#recurring-tasks

# production:
#   a_periodic_job:
#     class: MyJob
#     args: [ 42, { status: "custom_status" } ]
#     schedule: every second
#   a_cleanup_task:
#     command: "DeletedStuff.clear_all"
#     schedule: every day at 9am
production:
  recover_stuck_inat_imports:
    class: InatImportRecoveryJob
    # schedule must match InatImport::STUCK_THRESHOLD
    schedule: every 3 minutes
  # repopulate_location_and_observation_center_lat_lng and
  # discard_stale_jobs both used to fire at exactly midnight - on the
  # :maintenance queue's 2-thread pool (config/queue.yml), that alone
  # already saturates both threads, and midnight is also a multiple of
  # 3, colliding by schedule with recover_stuck_inat_imports above.
  # Staggered well apart (and off any :00/:03/:06... mark) so a normal
  # run of either doesn't queue behind (or force out) the other two.
  # The two jobs have no dependency on each other, so there's no cost
  # to a wide gap - and UpdateBoxAreaAndCenterColumnsJob's runtime
  # isn't bounded (it processes every observation whose location is
  # missing a center lat/lng, so a backlog from e.g. a large import
  # can make a single run take a while).
  repopulate_location_and_observation_center_lat_lng:
    class: UpdateBoxAreaAndCenterColumnsJob
    schedule: every day at 12:02am
  discard_stale_jobs:
    class: DiscardStaleJobsJob
    schedule: every day at 12:32am
  # check_rss_logs was one job until it got split by measured cost --
  # see CheckRssLogsJob's own comment for the local timing that drove
  # it (the observation type alone was ~46% of the total). Staggered
  # 5 minutes apart, off recover_stuck_inat_imports' every-3-minutes
  # marks, same reasoning as the stagger above.
  check_observation_rss_logs:
    class: CheckObservationRssLogsJob
    schedule: every day at 3:53am
  check_other_rss_logs:
    class: CheckOtherRssLogsJob
    schedule: every day at 3:58am
