# Two worker pools so periodic maintenance jobs (cache/data-integrity
# repairs, recurring cleanup) can't starve user-facing jobs
# (ImageDhashJob, ImageLoaderJob, FieldSlipJob, InatImportJob, and mail
# delivery via ActionMailer's deliver_later, which defaults to the
# "mailers" queue) of threads, and vice versa. Both worker processes run
# under the same single supervisor (see config/puma.rb +
# config/etc/solidqueue.service — issue #4639 / PR #4657 established
# that there must be exactly one *supervisor*; this config still starts
# two worker processes/thread-pools under it, one per queue group, which
# is the intended way to split capacity - it doesn't add a second
# supervisor).
default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: default
      threads: 4
      processes: 1
      polling_interval: 0.1
    # Mail delivery gets its own single-threaded pool so deliveries run one
    # at a time. Every send opens a fresh authenticated SMTP session, and
    # several concurrent sends made Gmail's relay reject the burst with
    # "454 Too many login attempts" — a large import dumped ~14K such
    # failures into the queue (#4757). One thread means logins never
    # overlap; normal mail volume is low, so serial delivery is ample.
    - queues: mailers
      threads: 1
      processes: 1
      polling_interval: 0.1
    - queues: maintenance
      threads: 2
      processes: 1
      polling_interval: 1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
